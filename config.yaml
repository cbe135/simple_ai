# Default config (example: liver CT)
# Run: python src/main.py --config config.yaml

environ:
  config_file: config.yaml
  seed: 888

data:
  train_percentage: 0.8
  val_percentage: 0.1
  test_percentage: 0.1
  spatial_size: [250, 250]
  repeats: 3
  rotate_range:
    - [0.17453292519943295, 0.3490658503988659]
    - [0.17453292519943295, 0.3490658503988659]
  shear_range: [[0, 0], [0, 0]]
  translate_range: [[-60, 60], [0, 0]]
  scale_range: [[0, 0], [0, 0]]
  affine_prob: 0
  spatial_axis: [0, 1]
  flip_prob: 0.5
  a_min: -125
  a_max: 200
  cache_rate: 1.0
  num_workers: 4

img_cnt: 5

training:
  num_epoch: 3
  batch_size: 4
  lr: 0.001
  timm_model: resnet18
  num_classes: 1

threshold: 0.5

# Extra transforms (MONAI bundle format) appended to the auto-derived presets.
# Each entry is a `_target_` dict; `@data.*` references the `data` section above.
# Leave empty (default) to use only the auto-derived preset transforms.
#
# loaders_extra     -> appended after LoadImaged / EnsureTyped
# preprocess_extra  -> appended after Resize / window / MaskIntensity / RepeatChannel
# augmentation_extra-> appended after RandAffine / RandFlip / GaussianNoise (train only)
#
# Example:
#   preprocess_extra:
#     - _target_: monai.transforms.RandGaussianSmoothd
#       keys: ["image"]
#       sigma_x: [0.5, 1.0]
transforms:
  loaders_extra: []
  preprocess_extra: []
  augmentation_extra: []
