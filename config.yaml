# Default config for D3 (Liver CT)
# To use D4 (Hackathon), run with: python src/main.py --task d4_hackathon --group-num 8

task: d3_liver_ct

environ:
  config_file: config.yaml
  seed: 888
  data_name: liver_data

data:
  train_percentage: 0.8
  val_percentage: 0.1
  test_percentage: 0.1
  spatial_size:
  - 250
  - 250
  repeats: 3
  rotate_range:
  - - 0.17453292519943295
    - 0.3490658503988659
  - - 0.17453292519943295
    - 0.3490658503988659
  shear_range:
  - - 0
    - 0
  - - 0
    - 0
  translate_range:
  - - -60
    - 60
  - - 0
    - 0
  scale_range:
  - - 0
    - 0
  - - 0
    - 0
  affine_prob: 0
  spatial_axis:
  - 0
  - 1
  flip_prob: 0.5
  a_min: -125
  a_max: 200
  cache_rate: 1

img_cnt: 5

training:
  num_epoch: 3
  batch_size: 128
  lr: 0.001
  timm_model: resnet18
  num_classes: 1

threshold: 0.5
