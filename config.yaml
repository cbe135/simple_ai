# Default config (example: image classification)
# Run: python src/main.py --config config.yaml

environ:
  config_file: config.yaml
  seed: 888

data:
  train_percentage: 0.8
  val_percentage: 0.1
  test_percentage: 0.1
  spatial_size: [250, 250]
  repeats: 3
  rotate_range:
    - [0.17453292519943295, 0.3490658503988659]
    - [0.17453292519943295, 0.3490658503988659]
  shear_range: [[0, 0], [0, 0]]
  translate_range: [[-60, 60], [0, 0]]
  scale_range: [[0, 0], [0, 0]]
  affine_prob: 0
  spatial_axis: [0, 1]
  flip_prob: 0.5
  a_min: -125
  a_max: 200
  cache_rate: 1.0
  num_workers: 4
  eval_train: true   # set false to skip the full train-set inference (~19s/run) for speed

img_cnt: 5

training:
  num_epoch: 3
  batch_size: 16
  lr: 0.001
  timm_model: resnet18
  num_classes: 1
  optimizer:
    name: adam
    weight_decay: 0.0
    momentum: 0.9
  loss:
    name: bce_with_logits

threshold: 0.5

# Per-modality transform presets (MONAI bundle format). The keys of `modalities`
# are the valid `--modality` choices. Each modality defines its full pipeline:
#   preprocess   -> deterministic, cached (Resize / window / mask / repeat-channel)
#   augmentation -> applied per-epoch on top of the cached items (train only)
# Use MONAI bundle `_target_` dicts; `@data::*` references the `data` section above.
# The pipeline is data-driven: MaskIntensityd is skipped when no masks exist
# (`_disabled_: "@data::mask_disabled"`), and `resize_keys`/`spatial_size` are
# adjusted at runtime to the image's spatial rank.
#
# Keep each modality's transforms appropriate to that imaging type (see
# src/program.md). Example references: nnU-Net (https://github.com/MIC-DKFZ/nnUNet)
# picks normalization per modality — CT is clipped to a fixed intensity window,
# while MRI/PET use dataset-wise z-score normalization.
modalities:
  ct:
    preprocess:
      - _target_: monai.transforms.Resized
        keys: "@data::resize_keys"
        spatial_size: "@data::spatial_size"
      - _target_: monai.transforms.ScaleIntensityRanged
        keys: ["image"]
        a_min: "@data::a_min"
        a_max: "@data::a_max"
        b_min: 0.0
        b_max: 1.0
        clip: true
      - _target_: monai.transforms.MaskIntensityd
        keys: ["image"]
        mask_key: "mask"
        _disabled_: "@data::mask_disabled"
      - _target_: monai.transforms.RepeatChanneld
        keys: ["image"]
        repeats: "@data::repeats"
    augmentation:
      - _target_: monai.transforms.RandAffined
        keys: ["image"]
        rotate_range: "@data::rotate_range"
        shear_range: "@data::shear_range"
        translate_range: "@data::translate_range"
        scale_range: "@data::scale_range"
        prob: "@data::affine_prob"
        padding_mode: "border"
      - _target_: monai.transforms.RandFlipd
        keys: ["image"]
        spatial_axis: "@data::spatial_axis"
        prob: "@data::flip_prob"
      - _target_: monai.transforms.RandGaussianNoiseD
        keys: ["image"]
  mri:
    preprocess:
      - _target_: monai.transforms.Resized
        keys: ["image"]
        spatial_size: "@data::spatial_size"
      - _target_: monai.transforms.RepeatChanneld
        keys: ["image"]
        repeats: "@data::repeats"
    augmentation:
      - _target_: monai.transforms.RandAffined
        keys: ["image"]
        rotate_range: "@data::rotate_range"
        shear_range: "@data::shear_range"
        translate_range: "@data::translate_range"
        scale_range: "@data::scale_range"
        prob: "@data::affine_prob"
        padding_mode: "border"
      - _target_: monai.transforms.RandFlipd
        keys: ["image"]
        spatial_axis: "@data::spatial_axis"
        prob: "@data::flip_prob"
      - _target_: monai.transforms.RandGaussianNoiseD
        keys: ["image"]
  xray:
    preprocess:
      - _target_: monai.transforms.Resized
        keys: ["image"]
        spatial_size: "@data::spatial_size"
      - _target_: monai.transforms.RepeatChanneld
        keys: ["image"]
        repeats: "@data::repeats"
    augmentation:
      - _target_: monai.transforms.RandAffined
        keys: ["image"]
        rotate_range: "@data::rotate_range"
        shear_range: "@data::shear_range"
        translate_range: "@data::translate_range"
        scale_range: "@data::scale_range"
        prob: "@data::affine_prob"
        padding_mode: "border"
      - _target_: monai.transforms.RandFlipd
        keys: ["image"]
        spatial_axis: "@data::spatial_axis"
        prob: "@data::flip_prob"
      - _target_: monai.transforms.RandGaussianNoiseD
        keys: ["image"]
  color:
    preprocess:
      - _target_: monai.transforms.Resized
        keys: ["image"]
        spatial_size: "@data::spatial_size"
    augmentation:
      - _target_: monai.transforms.RandAffined
        keys: ["image"]
        rotate_range: "@data::rotate_range"
        shear_range: "@data::shear_range"
        translate_range: "@data::translate_range"
        scale_range: "@data::scale_range"
        prob: "@data::affine_prob"
        padding_mode: "border"
      - _target_: monai.transforms.RandFlipd
        keys: ["image"]
        spatial_axis: "@data::spatial_axis"
        prob: "@data::flip_prob"
      - _target_: monai.transforms.RandGaussianNoiseD
        keys: ["image"]

# Extra transforms (MONAI bundle format) appended AFTER the per-modality presets.
# Each entry is a `_target_` dict; `@data::*` references the `data` section above.
# Leave empty (default) to use only the modality preset transforms.
#
# loaders_extra     -> appended after LoadImaged / EnsureTyped
# preprocess_extra  -> appended after the modality's preprocess
# augmentation_extra-> appended after the modality's augmentation (train only)
#
# Example:
#   preprocess_extra:
#     - _target_: monai.transforms.RandGaussianSmoothd
#       keys: ["image"]
#       sigma_x: [0.5, 1.0]
transforms:
  loaders_extra: []
  preprocess_extra: []
  augmentation_extra: []
